name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: cdk
        run: npm ci

      - name: Build
        working-directory: cdk
        run: npm run build

      - name: Test
        working-directory: cdk
        run: npx jest --coverage
